<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <title>INKSPIRE BUSINESS SOLUTIONS</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      scroll-behavior:smooth;
    }

    body{
      font-family:Arial, sans-serif;
      background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
      color:white;
    }

    nav{
      width:100%;
      padding:20px 50px;
      background:rgba(0,0,0,0.7);
      backdrop-filter:blur(10px);
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:fixed;
      top:0;
      z-index:1000;
    }

    nav h1{
      font-size:30px;
      color:#fff;
    }

    nav ul{
      display:flex;
      list-style:none;
      gap:25px;
    }

    nav ul li a{
      color:white;
      text-decoration:none;
      font-size:18px;
      transition:0.3s;
    }

    nav ul li a:hover{
      color:yellow;
    }

    .hero{
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
    }

    .hero h2{
      font-size:75px;
      margin-bottom:20px;
      text-shadow:0 0 20px rgba(255,255,255,0.8);
      animation:zoom 2s infinite alternate;
    }

    @keyframes zoom{
      from{
        transform:scale(1);
      }

      to{
        transform:scale(1.05);
      }
    }

    .hero p{
      font-size:28px;
      margin-bottom:40px;
    }

    .btn{
      padding:15px 35px;
      border:none;
      border-radius:30px;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      margin:10px;
      background:white;
      color:black;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.1);
      background:black;
      color:white;
    }

    .section{
      padding:100px 10%;
      text-align:center;
    }

    .section h2{
      font-size:55px;
      margin-bottom:40px;
      text-shadow:0 0 10px rgba(255,255,255,0.5);
    }

    .products{
      display:flex;
      justify-content:center;
      gap:30px;
      flex-wrap:wrap;
    }

    .card{
      width:320px;
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(15px);
      border-radius:25px;
      overflow:hidden;
      box-shadow:0 0 20px rgba(0,0,0,0.3);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-12px);
    }

    .card img{
      width:100%;
      height:300px;
      object-fit:cover;
    }

    .card-content{
      padding:25px;
    }

    .card h3{
      font-size:28px;
      margin-bottom:15px;
    }

    .price{
      font-size:35px;
      font-weight:bold;
      margin:20px 0;
      color:yellow;
    }

    footer{
      background:rgba(0,0,0,0.7);
      padding:30px;
      text-align:center;
      margin-top:60px;
    }

    @media(max-width:768px){

      nav{
        flex-direction:column;
        gap:20px;
      }

      nav ul{
        flex-direction:column;
      }

      .hero h2{
        font-size:45px;
      }

      .hero p{
        font-size:20px;
      }

    }

  </style>
</head>
