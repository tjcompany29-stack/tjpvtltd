<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>INKSPIRE BUSINESS SOLUTIONS</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      scroll-behavior:smooth;
    }

    body{
      font-family:Arial,sans-serif;
      background:#ffffff;
      color:#111;
      overflow-x:hidden;
    }

    nav{
      width:100%;
      padding:20px 50px;
      background:rgba(255,255,255,0.9);
      backdrop-filter:blur(10px);
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:fixed;
      top:0;
      z-index:1000;
      box-shadow:0 2px 15px rgba(0,0,0,0.1);
    }

    nav h1{
      font-size:30px;
      animation:textcolor 4s infinite;
    }

    nav ul{
      display:flex;
      gap:25px;
      list-style:none;
    }

    nav ul li a{
      text-decoration:none;
      font-size:18px;
      color:#111;
      transition:0.3s;
      font-weight:bold;
    }

    nav ul li a:hover{
      color:#ff4d6d;
    }

    .hero{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      text-align:center;
      padding:20px;
      background:linear-gradient(135deg,#ffffff,#f8f9ff,#eef2ff);
    }

    .hero h2{
      font-size:80px;
      margin-bottom:20px;
      animation:textcolor 3s infinite;
    }

    .hero p{
      font-size:28px;
      margin-bottom:40px;
      color:#555;
      animation:textcolor 5s infinite;
    }

    @keyframes textcolor{

      0%{
        color:#111;
      }

      25%{
        color:#ff4d6d;
      }

      50%{
        color:#0077ff;
      }

      75%{
        color:#00b894;
      }

      100%{
        color:#9c27b0;
      }

    }

    .btn{
      padding:15px 35px;
      border:none;
      border-radius:40px;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      margin:10px;
      transition:0.4s;
      background:#111;
      color:white;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    .btn:hover{
      transform:scale(1.08);
      background:#ff4d6d;
      color:white;
    }

    .section{
      padding:100px 10%;
      text-align:center;
    }

    .section h2{
      font-size:60px;
      margin-bottom:40px;
      animation:textcolor 4s infinite;
    }

    .products{
      display:flex;
      justify-content:center;
      gap:30px;
      flex-wrap:wrap;
    }

    .card{
      width:320px;
      background:white;
      border-radius:25px;
      overflow:hidden;
      transition:0.4s;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
    }

    .card:hover{
      transform:translateY(-12px);
      box-shadow:0 15px 40px rgba(0,0,0,0.2);
    }

    .card img{
      width:100%;
      height:300px;
      object-fit:cover;
    }

    .card-content{
      padding:25px;
    }

    .card h3{
      font-size:30px;
      margin-bottom:15px;
      animation:textcolor 5s infinite;
    }

    .price{
      font-size:38px;
      font-weight:bold;
      margin:20px 0;
      animation:textcolor 3s infinite;
    }

    footer{
      padding:30px;
      text-align:center;
      background:#f1f1f1;
      margin-top:60px;
      color:#555;
      font-weight:bold;
    }

    @media(max-width:768px){

      nav{
        flex-direction:column;
        gap:20px;
      }

      nav ul{
        flex-direction:column;
      }

      .hero h2{
        font-size:45px;
      }

      .hero p{
        font-size:20px;
      }

    }

  </style>

</head>

<body>

  <section class="section" id="contact">

</html>
